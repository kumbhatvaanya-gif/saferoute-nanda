services:
  - type: web
    name: saferoute-emergency-planner
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT --proxy-headers
    healthCheckPath: /health
    envVars:
      - key: PUBLIC_BASE_URL
        sync: false
